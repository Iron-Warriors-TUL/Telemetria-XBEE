<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Telemetry</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="ok">

<!-- PANEL STEROWANIA -->
<div class="control">
    <div class="field">
        <span>LICZBA OKRĄŻEŃ</span>
        <input id="max_laps" type="number" value="10">
    </div>

    <div class="field">
        <span>DOCELOWY CZAS OKRĄŻENIA (s)</span>
        <input id="lap_target_time" type="number" value="90">
    </div>

    <button onclick="start()">START</button>
    <button onclick="reset()">RESET</button>
    <button id="saveBtn" onclick="save()" disabled>ZAPISZ WYNIKI</button>
</div>

<!-- CZASY -->
<div class="top">
    <div class="time-box">
        <div class="label">CZAS OKRĄŻENIA</div>
        <div class="value" id="lap_time">--:--</div>
    </div>

    <div class="time-box">
        <div class="label">POZOSTAŁY DOCELOWY CZAS OKRĄŻENIA</div>
        <div class="value" id="lap_time_remaining">--:--</div>
    </div>

    <div class="time-box">
        <div class="label">POZOSTAŁY DOCELOWY CZAS WYŚCIGU</div>
        <div class="value" id="race_time_remaining">--:--</div>
    </div>

    <div class="time-box">
        <div class="label">REZERWA / STRATA</div>
        <div class="value fixed-width" id="time_delta">--</div>
    </div>
</div>

<!-- LICZNIKI -->
<div class="center">
    <div class="gauge">
        <div class="gauge-label">RPM</div>
        <div class="gauge-value" id="rpm">0</div>
    </div>

    <div class="gauge">
        <div class="gauge-label">KM/H</div>
        <div class="gauge-value" id="speed">0</div>
    </div>
</div>

<!-- INFO -->
<div class="bottom">
    <div class="info lap-info">
        Okrążenie:
        <button onclick="lapDec()">−</button>
        <span id="lap_current">-</span>/<span id="lap_total">-</span>
        <button onclick="lapInc()">+</button>
    </div>

    <div class="info">
        CLT: <span id="engine_temp">-</span> °C
    </div>

    <div class="info">
        OIL: <span id="oil_temp">-</span> °C
    </div>

    <div class="info">
        IAT: <span id="intake_temp">-</span> °C
    </div>

    <div class="info">
        EGT: <span id="emission_temp">-</span> °C
    </div>

    <div class="info">
        BV: <span id="battery_voltage">-</span> V
    </div>
</div>

<div id="saveModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Zapisz wyniki</h3>

        <label>Data i godzina wyścigu:</label>
        <input type="datetime-local" id="raceDateTime">

        <input type="text" id="driverName" placeholder="Kierowca">
        <input type="text" id="racePlace" placeholder="Miejsce">
        <textarea id="raceComment" placeholder="Komentarz"></textarea>

        <div class="modal-buttons">
            <button onclick="closeSaveModal()" class="btn-cancel">ANULUJ</button>
            <button onclick="confirmSave()">ZAPISZ</button>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
